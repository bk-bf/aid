# tmux/palette.conf — generated by gen-tmux-palette.sh
# DO NOT EDIT — regenerated from nvim/lua/palette.lua at each aid session start.

set -g status-style          "bg=#6181C6 fg=#ffffff"
set -g status-left-length 90
set -g status-right-length 90

set -g status-left  "#[fg=#000000,bg=#b57bee,bold] #S #[fg=#b57bee,bg=#6181C6,none]  "
set -g status-right "#[fg=#A284C6,bg=#6181C6]#[fg=#ffffff,bg=#A284C6] %H:%M #[fg=#b57bee,bg=#A284C6]#[fg=#000000,bg=#b57bee,bold] #{?client_prefix,PREFIX,#h} "

set -g window-status-style          ""
set -g window-status-format         ""
set -g window-status-current-format ""
